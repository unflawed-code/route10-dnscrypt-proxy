# Route10 DNSCrypt-Proxy Base Configuration
# To override settings, place a 'custom.toml' file in the directory.
# It will be automatically merged by start.sh at runtime.

server_names = ['cloudflare']
listen_addresses = ['127.0.0.1:5059']

# IPv6 Support
ipv6_servers = true
block_ipv6 = false

# Optimizations
max_clients = 250
netprobe_timeout = 2
keepalive = 30
tls_disable_session_tickets = false
cache = true
cache_size = 1024
cache_min_ttl = 60
cache_max_ttl = 3600
cache_neg_min_ttl = 60
cache_neg_max_ttl = 600

# Logging
log_level = 2
log_file = '/var/log/dnscrypt-proxy.log'

# Required to lookup dynamic servers like Cloudflare or Quad9
[sources]
  [sources.'public-resolvers']
  urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v2/public-resolvers.md', 'https://download.dnscrypt.info/resolvers-list/v2/public-resolvers.md']
  cache_file = 'public-resolvers.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'

  [sources.'relays']
  urls = ['https://raw.githubusercontent.com/DNSCrypt/dnscrypt-resolvers/master/v2/relays.md', 'https://download.dnscrypt.info/resolvers-list/v2/relays.md']
  cache_file = 'relays.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'

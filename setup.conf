# Route10 DNSCrypt-Proxy Configuration Source

# 1. DNSCrypt-Proxy Configuration
DNSCRYPT_VERSION="2.1.15"
DNSCRYPT_DOWNLOAD_URL="https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/${DNSCRYPT_VERSION}/dnscrypt-proxy-linux_arm64-${DNSCRYPT_VERSION}.tar.gz"

# 2. Binary Compression Configuration
# DNSCrypt-Proxy is naturally ~15MB. UPX compresses it to ~5MB to save router flash space.
UPX_VERSION="5.1.1"
UPX_DOWNLOAD_URL="https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-arm64_linux.tar.xz"
COMPRESS_BINARY="1"

# 3. Installation Directories
TMP_DIR="/tmp/dnscrypt-setup"
POST_CFG="/cfg/post-cfg.sh"
